global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ips-system'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend:5000'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['localhost:5001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ai:5001'
