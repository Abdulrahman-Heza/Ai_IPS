# IPS — full stack (AI + Backend). Frontend runs locally via npm for hot reload.
# Usage: docker compose up --build
# Then: cd frontend && npm install && npm run dev

services:
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      LOG_LEVEL: INFO
    volumes:
      - ./ai/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      AI_SERVICE_URL: http://ai:5001
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      JWT_SECRET: change-me-in-production
    depends_on:
      ai:
        condition: service_healthy
    volumes:
      - backend-data:/app/data

volumes:
  backend-data:
